name: Documentation

on:
  push:
    branches: [main, master]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'docs-site/**'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'docs-site/**'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Build Loom
        run: go build ./cmd/loom

      - name: Generate CLI documentation
        run: go run ./cmd/loom docs ./docs-site/cli-reference

      - name: Generate config documentation
        run: go run ./cmd/loom config-docs ./docs-site/config-reference

      - name: Upload documentation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: docs-site/
          retention-days: 7

  deploy:
    needs: generate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download documentation artifacts
        uses: actions/download-artifact@v4
        with:
          name: docs
          path: docs-site/

      - name: Deploy to Mintlify
        uses: mintlify/mintlify-action@v1
        with:
          mintlify-token: ${{ secrets.MINTLIFY_TOKEN }}
          docs-path: ./docs-site

  preview:
    needs: generate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download documentation artifacts
        uses: actions/download-artifact@v4
        with:
          name: docs
          path: docs-site/

      - name: Create preview deployment
        id: preview
        uses: mintlify/mintlify-action@v1
        with:
          mintlify-token: ${{ secrets.MINTLIFY_TOKEN }}
          docs-path: ./docs-site
          preview: true

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.preview.outputs.preview-url }}';
            if (previewUrl) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `📚 Documentation preview deployed!\n\nPreview URL: ${previewUrl}`
              });
            }

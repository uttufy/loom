<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="loomGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9F7AEA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7D56F4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Loom representation - interwoven threads -->
  <rect width="100" height="100" rx="20" fill="url(#loomGradient)"/>
  <!-- Warp threads (vertical) -->
  <line x1="25" y1="10" x2="25" y2="90" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  <line x1="50" y1="10" x2="50" y2="90" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  <line x1="75" y1="10" x2="75" y2="90" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  <!-- Weft threads (horizontal, interwoven) -->
  <line x1="10" y1="25" x2="90" y2="25" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <line x1="10" y1="50" x2="90" y2="50" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <line x1="10" y1="75" x2="90" y2="75" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <!-- Center highlight -->
  <circle cx="50" cy="50" r="8" fill="white" opacity="0.3"/>
</svg>
